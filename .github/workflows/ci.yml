name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-orinadus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --if-present
      - run: npx tsc --noEmit --skipLibCheck 2>/dev/null || echo "no tsconfig"
        name: Type check
